{% extends "admin/layout.html" %}

{% block admin_content %}
<div class="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4">
    <h2 class="text-2xl font-black uppercase text-white">Quản Lý Banner</h2>
    <a href="{{ url_for('admin.new_banner') }}" class="bg-primary hover:bg-primary-dark text-black px-6 py-2 rounded-lg font-bold transition-colors shadow-[0_0_15px_rgba(57,255,20,0.3)]">
        <i class="fa-solid fa-plus mr-2"></i> Thêm Mới
    </a>
</div>

<div class="bg-gray-900 rounded-2xl border border-gray-800 overflow-hidden shadow-sm">
    <div class="overflow-x-auto">
        <table class="w-full text-left text-gray-300">
            <thead class="bg-black/50 border-b border-gray-800 text-gray-400 uppercase text-xs font-bold tracking-wider">
                <tr>
                    <th class="p-4">Hình ảnh</th>
                    <th class="p-4">Tiêu đề</th>
                    <th class="p-4">Trạng thái</th>
                    <th class="p-4">Thao tác</th>
                </tr>
            </thead>
            <tbody class="divide-y divide-gray-800 text-sm">
                {% for b in banners %}
                <tr class="hover:bg-gray-800/50 transition-colors">
                    <td class="p-4">
                        <img src="{{ b.image }}" alt="Banner" class="w-32 h-16 object-cover rounded border border-gray-700">
                    </td>
                    <td class="p-4 font-bold text-white">{{ b.title or '(Không có)' }}</td>
                    <td class="p-4">
                        {% if b.is_active %}
                        <span class="inline-block bg-green-900/30 text-green-500 border border-green-800 px-3 py-1 rounded-full text-xs font-bold uppercase">Hoạt động</span>
                        {% else %}
                        <span class="inline-block bg-red-900/30 text-red-500 border border-red-800 px-3 py-1 rounded-full text-xs font-bold uppercase">Đã ẩn</span>
                        {% endif %}
                    </td>
                    <td class="p-4">
                        <div class="flex items-center gap-2">
                            <form action="{{ url_for('admin.delete_banner', id=b.id) }}" method="POST" onsubmit="return confirm('Bạn có chắc muốn xóa banner này?');">
                                <button type="submit" class="bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white px-3 py-1.5 rounded text-xs font-bold transition-colors border border-red-500/30">Xóa</button>
                            </form>
                        </div>
                    </td>
                </tr>
                {% else %}
                <tr>
                    <td colspan="4" class="p-8 text-center text-gray-500">
                        Chưa có Banner nào.
                    </td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </div>
</div>
{% endblock %}
