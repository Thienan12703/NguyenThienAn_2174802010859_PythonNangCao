{% extends "base.html" %}

{% block content %}
<div class="row">
    <!-- Admin Sidebar -->
    <div class="col-md-3 mb-4">
        <div class="list-group list-group-flush bg-dark rounded border border-secondary">
            <a href="{{ url_for('admin.dashboard') }}" class="list-group-item list-group-item-action bg-dark text-light border-secondary {% if request.endpoint == 'admin.dashboard' %}active bg-primary text-dark border-primary{% endif %}">
                <i class="bi bi-speedometer2"></i> Tổng quan
            </a>
            <a href="{{ url_for('admin.products') }}" class="list-group-item list-group-item-action bg-dark text-light border-secondary {% if request.endpoint == 'admin.products' or request.endpoint == 'admin.new_product' or request.endpoint == 'admin.edit_product' %}active bg-primary text-dark border-primary{% endif %}">
                <i class="bi bi-box-seam"></i> Quản lý Sản phẩm
            </a>
            <a href="{{ url_for('admin.orders') }}" class="list-group-item list-group-item-action bg-dark text-light border-secondary {% if request.endpoint == 'admin.orders' %}active bg-primary text-dark border-primary{% endif %}">
                <i class="bi bi-cart-check"></i> Quản lý Đơn hàng
            </a>
        </div>
    </div>
    
    <!-- Admin Content -->
    <div class="col-md-9">
        {% block admin_content %}{% endblock %}
    </div>
</div>
{% endblock %}
