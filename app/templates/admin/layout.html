{% extends "base.html" %}

{% block content %}
<div class="py-8 max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
    <div class="flex flex-col lg:flex-row gap-8">
        <!-- Admin Sidebar -->
        <aside class="w-full lg:w-64 shrink-0">
            <div class="bg-gray-900 rounded-2xl shadow-sm border border-gray-800 p-4 sticky top-24">
                <h3 class="text-lg font-black uppercase text-white px-4 mb-4">Quản Trị Viên</h3>
                <nav class="space-y-2">
                    <a href="{{ url_for('admin.dashboard') }}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-colors {% if request.endpoint == 'admin.dashboard' %}bg-primary/20 text-primary font-bold{% else %}text-gray-400 hover:bg-gray-800 hover:text-white{% endif %}">
                        <i class="fa-solid fa-chart-pie w-5"></i> Tổng quan
                    </a>
                    <a href="{{ url_for('admin.products') }}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-colors {% if 'product' in request.endpoint %}bg-primary/20 text-primary font-bold{% else %}text-gray-400 hover:bg-gray-800 hover:text-white{% endif %}">
                        <i class="fa-solid fa-box w-5"></i> Sản phẩm
                    </a>
                    <a href="{{ url_for('admin.brands') }}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-colors {% if 'brand' in request.endpoint %}bg-primary/20 text-primary font-bold{% else %}text-gray-400 hover:bg-gray-800 hover:text-white{% endif %}">
                        <i class="fa-solid fa-tag w-5"></i> Thương hiệu
                    </a>
                    <a href="{{ url_for('admin.orders') }}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-colors {% if 'order' in request.endpoint %}bg-primary/20 text-primary font-bold{% else %}text-gray-400 hover:bg-gray-800 hover:text-white{% endif %}">
                        <i class="fa-solid fa-clipboard-list w-5"></i> Đơn hàng
                    </a>
                    <a href="{{ url_for('admin.banners') }}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-colors {% if 'banner' in request.endpoint %}bg-primary/20 text-primary font-bold{% else %}text-gray-400 hover:bg-gray-800 hover:text-white{% endif %}">
                        <i class="fa-solid fa-image w-5"></i> Banner
                    </a>
                    <a href="{{ url_for('admin.posts') }}" class="flex items-center gap-3 px-4 py-3 rounded-xl transition-colors {% if 'post' in request.endpoint %}bg-primary/20 text-primary font-bold{% else %}text-gray-400 hover:bg-gray-800 hover:text-white{% endif %}">
                        <i class="fa-solid fa-newspaper w-5"></i> Bài viết
                    </a>
                </nav>
            </div>
        </aside>

        <!-- Admin Content -->
        <main class="flex-1 min-w-0">
            {% block admin_content %}{% endblock %}
        </main>
    </div>
</div>
{% endblock %}
